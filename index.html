<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Employee Attendance</title>
</head>
<body>

<h1>Attendance Check-In</h1>

<button onclick="sendAttendance()">Check In</button>

<p id="status"></p>

<script>
async function sendAttendance() {

const status = document.getElementById("status");

const empid = new URLSearchParams(window.location.search).get("empid");

if (!empid) {
status.innerHTML = "Employee ID not found";
return;
}

navigator.geolocation.getCurrentPosition(async function(position){

const lat = position.coords.latitude;
const lon = position.coords.longitude;

await fetch(
"https://kyawyetunuplink.app.n8n.cloud/webhook/attendance?empid="
+ empid +
"&lat=" + lat +
"&lon=" + lon
);

status.innerHTML = "Attendance Sent Successfully";

}, function(){

status.innerHTML = "Location Permission Denied";

});

}
</script>

</body>
</html>
